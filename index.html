<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生排班系统</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #eee;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        input, select {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .doctors-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        .doctor-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px;
            font-size: 14px;
        }
        .doctor-tag .remove {
            cursor: pointer;
            opacity: 0.8;
        }
        .doctor-tag .remove:hover {
            opacity: 1;
        }
        .settings-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .setting-item label {
            font-size: 14px;
            color: #666;
        }
        /* 日历样式 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .calendar-nav button {
            padding: 8px 16px;
        }
        .calendar-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        .calendar-weekday {
            background: #f5f5f5;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            color: #666;
            font-size: 13px;
        }
        .calendar-day {
            background: white;
            padding: 8px;
            min-height: 70px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .calendar-day:hover {
            background: #f9f9f9;
        }
        .calendar-day.other-month {
            background: #fafafa;
            color: #ccc;
        }
        .calendar-day.today {
            background: #fef3c7;
        }
        .calendar-day.selected {
            background: #dbeafe;
        }
        .day-number {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .day-doctor {
            font-size: 12px;
            color: #667eea;
            font-weight: 500;
        }
        .day-rest {
            font-size: 11px;
            color: #ef4444;
        }
        .day-swap {
            font-size: 11px;
            color: #f59e0b;
        }
        .day-holiday {
            font-size: 10px;
            color: #dc2626;
            background: #fef2f2;
            padding: 1px 3px;
            border-radius: 3px;
        }
        .calendar-day.holiday {
            background: #fff5f5;
        }
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        /* 操作记录 */
        .records-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .record-item {
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .record-item .date {
            color: #666;
        }
        .record-item .action {
            color: #667eea;
            font-weight: 500;
        }
        /* 导出区域 */
        #exportArea {
            display: none;
            background: white;
            padding: 20px;
        }
        /* 响应式 */
        @media (max-width: 768px) {
            .calendar-day {
                min-height: 50px;
                padding: 4px;
            }
            .day-number {
                font-size: 12px;
            }
            .day-doctor {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 医生排班系统</h1>
        
        <!-- 医生管理 -->
        <div class="card">
            <div class="card-title">👥 值班医生</div>
            <div class="input-group">
                <input type="text" id="doctorName" placeholder="输入医生姓名" style="flex:1; min-width:150px;">
                <button class="btn btn-primary" onclick="addDoctor()">添加医生</button>
                <button class="btn btn-secondary" onclick="clearDoctors()">清空</button>
            </div>
            <div class="doctors-list" id="doctorsList"></div>
        </div>
        
        <!-- 排班设置 -->
        <div class="card">
            <div class="card-title">⚙️ 排班设置</div>
            <div class="settings-row">
                <div class="setting-item">
                    <label>起始日期:</label>
                    <input type="date" id="startDate">
                </div>
                <div class="setting-item">
                    <label>排班周期:</label>
                    <select id="scheduleMonths">
                        <option value="1">1个月</option>
                        <option value="3">3个月</option>
                        <option value="6" selected>6个月</option>
                        <option value="12">12个月</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="generateSchedule()">生成排班</button>
            </div>
        </div>
        
        <!-- 日历视图 -->
        <div class="card">
            <div class="card-title">📅 排班日历</div>
            <div class="calendar-header">
                <div class="calendar-nav">
                    <button class="btn btn-secondary" onclick="prevMonth()">◀ 上月</button>
                    <span class="calendar-title" id="calendarTitle">2024年1月</span>
                    <button class="btn btn-secondary" onclick="nextMonth()">下月 ▶</button>
                </div>
                <div>
                    <button class="btn btn-success" onclick="exportImage()">📥 导出图片</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        
        <!-- 操作记录 -->
        <div class="card">
            <div class="card-title">📝 调班/休息记录</div>
            <div class="records-list" id="recordsList">
                <p style="color:#999; text-align:center;">暂无记录</p>
            </div>
        </div>
    </div>
    
    <!-- 日期操作弹窗 -->
    <div class="modal" id="dayModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">2024年1月1日</div>
            <div id="modalBody">
                <p style="margin-bottom:12px;">当前值班: <strong id="currentDoctor">-</strong></p>
                
                <div id="holidayInfo" style="display:none; margin-bottom:12px; padding:8px; background:#fef2f2; border-radius:6px;">
                    <span style="color:#dc2626; font-weight:600;">🎉 法定假日: <span id="holidayName"></span></span>
                </div>
                
                <div style="margin-bottom:16px;">
                    <label style="font-size:14px; color:#666;">调换为:</label>
                    <select id="swapDoctor" style="width:100%; margin-top:8px;">
                        <option value="">选择医生...</option>
                    </select>
                </div>
                
                <div style="margin-bottom:16px;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" id="markRest">
                        <span>标记为休息日（自动顺延）</span>
                    </label>
                </div>
                
                <div id="normalDaySection" style="display:none; margin-bottom:16px;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" id="markNormalDay">
                        <span>法定假日添加正常班</span>
                    </label>
                    <div id="normalDoctorSection" style="display:none; margin-top:10px; padding:10px; background:#f0fdf4; border-radius:8px;">
                        <div style="margin-bottom:10px;">
                            <label style="font-size:13px; color:#666;">上午:</label>
                            <select id="normalDoctorAM" style="width:100%; margin-top:4px;">
                                <option value="">选择医生...</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size:13px; color:#666;">下午:</label>
                            <select id="normalDoctorPM" style="width:100%; margin-top:4px;">
                                <option value="">选择医生...</option>
                            </select>
                        </div>
                        <p style="font-size:11px; color:#999; margin-top:8px;">* 可只填一人，或两人分上下午</p>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-danger" id="resetBtn" style="display:none;" onclick="resetDay()">重置</button>
                <button class="btn btn-primary" onclick="saveDayChange()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 导出区域（隐藏） -->
    <div id="exportArea"></div>

    <script>
        // 数据存储
        let doctors = JSON.parse(localStorage.getItem('paiban_doctors') || '[]');
        let schedule = JSON.parse(localStorage.getItem('paiban_schedule') || '{}');
        let records = JSON.parse(localStorage.getItem('paiban_records') || '[]');
        let restDays = JSON.parse(localStorage.getItem('paiban_rest') || '{}');
        let swaps = JSON.parse(localStorage.getItem('paiban_swaps') || '{}');
        let normalDays = JSON.parse(localStorage.getItem('paiban_normal') || '{}'); // 法定假日正常班
        
        // 中国法定假日配置 (年份 -> { 日期: 假日名称 })
        // 来源: 国务院办公厅关于2026年部分节假日安排的通知 (国办发明电〔2025〕7号)
        const HOLIDAYS = {
            // 2026年放假安排
            // 元旦: 1月1日-3日放假，1月4日上班
            // 春节: 2月15日-23日放假，2月14日、28日上班
            // 清明: 4月4日-6日放假
            // 劳动节: 5月1日-5日放假，5月9日上班
            // 端午: 6月19日-21日放假
            // 中秋: 9月25日-27日放假
            // 国庆: 10月1日-7日放假，9月20日、10月10日上班
            2026: {
                '2026-01-01': '元旦', '2026-01-02': '元旦', '2026-01-03': '元旦',
                '2026-02-15': '春节', '2026-02-16': '春节', '2026-02-17': '春节', '2026-02-18': '春节',
                '2026-02-19': '春节', '2026-02-20': '春节', '2026-02-21': '春节', '2026-02-22': '春节', '2026-02-23': '春节',
                '2026-04-04': '清明', '2026-04-05': '清明', '2026-04-06': '清明',
                '2026-05-01': '劳动节', '2026-05-02': '劳动节', '2026-05-03': '劳动节', '2026-05-04': '劳动节', '2026-05-05': '劳动节',
                '2026-06-19': '端午', '2026-06-20': '端午', '2026-06-21': '端午',
                '2026-09-25': '中秋', '2026-09-26': '中秋', '2026-09-27': '中秋',
                '2026-10-01': '国庆', '2026-10-02': '国庆', '2026-10-03': '国庆', '2026-10-04': '国庆',
                '2026-10-05': '国庆', '2026-10-06': '国庆', '2026-10-07': '国庆'
            }
        };
        
        // 获取假日信息
        function getHoliday(dateStr) {
            const year = parseInt(dateStr.split('-')[0]);
            return HOLIDAYS[year]?.[dateStr] || null;
        }
        
        let currentDate = new Date();
        let selectedDate = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('startDate').valueAsDate = new Date();
            renderDoctors();
            renderCalendar();
            renderRecords();
        });
        
        // 添加医生
        function addDoctor() {
            const input = document.getElementById('doctorName');
            const name = input.value.trim();
            
            if (!name) {
                alert('请输入医生姓名');
                return;
            }
            
            if (doctors.includes(name)) {
                alert('该医生已存在');
                return;
            }
            
            doctors.push(name);
            saveData();
            renderDoctors();
            input.value = '';
        }
        
        // 删除医生
        function removeDoctor(name) {
            doctors = doctors.filter(d => d !== name);
            saveData();
            renderDoctors();
        }
        
        // 清空医生
        function clearDoctors() {
            if (confirm('确定清空所有医生？')) {
                doctors = [];
                saveData();
                renderDoctors();
            }
        }
        
        // 渲染医生列表
        function renderDoctors() {
            const list = document.getElementById('doctorsList');
            if (doctors.length === 0) {
                list.innerHTML = '<span style="color:#999;">请添加值班医生</span>';
                return;
            }
            
            list.innerHTML = doctors.map((d, i) => `
                <div class="doctor-tag">
                    <span>${i + 1}. ${d}</span>
                    <span class="remove" onclick="removeDoctor('${d}')">✕</span>
                </div>
            `).join('');
        }
        
        // 生成排班
        function generateSchedule() {
            if (doctors.length === 0) {
                alert('请先添加值班医生');
                return;
            }
            
            const startDate = document.getElementById('startDate').value;
            if (!startDate) {
                alert('请选择起始日期');
                return;
            }
            
            const months = parseInt(document.getElementById('scheduleMonths').value);
            const start = new Date(startDate);
            const end = new Date(start);
            end.setMonth(end.getMonth() + months);
            
            schedule = {};
            let doctorIndex = 0;
            
            const current = new Date(start);
            while (current < end) {
                const dateStr = formatDateStr(current);
                
                // 检查是否是休息日
                if (!restDays[dateStr]) {
                    schedule[dateStr] = doctors[doctorIndex % doctors.length];
                    doctorIndex++;
                }
                
                current.setDate(current.getDate() + 1);
            }
            
            // 重新应用调班和休息
            applyModifications();
            
            saveData();
            renderCalendar();
            alert('排班生成成功！');
        }
        
        // 应用调班和休息修改
        function applyModifications() {
            // 先处理休息日（顺延）
            const sortedDates = Object.keys(restDays).sort();
            for (const dateStr of sortedDates) {
                if (restDays[dateStr] && schedule[dateStr]) {
                    // 获取休息医生的下一个值班日期
                    const restDoctor = schedule[dateStr];
                    delete schedule[dateStr];
                    
                    // 找到下一个可用的日期安排该医生
                    const nextDate = findNextAvailableDate(dateStr, restDoctor);
                    if (nextDate) {
                        schedule[nextDate] = restDoctor;
                    }
                }
            }
            
            // 再应用调班
            for (const [dateStr, newDoctor] of Object.entries(swaps)) {
                if (schedule[dateStr] !== undefined) {
                    schedule[dateStr] = newDoctor;
                }
            }
        }
        
        // 找到下一个可用日期
        function findNextAvailableDate(fromDate, doctor) {
            const date = new Date(fromDate);
            const months = parseInt(document.getElementById('scheduleMonths').value) || 6;
            const endDate = new Date(document.getElementById('startDate').value);
            endDate.setMonth(endDate.getMonth() + months);
            
            date.setDate(date.getDate() + 1);
            
            while (date < endDate) {
                const dateStr = formatDateStr(date);
                if (!schedule[dateStr] && !restDays[dateStr]) {
                    return dateStr;
                }
                date.setDate(date.getDate() + 1);
            }
            
            return null;
        }
        
        // 渲染日历
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            title.textContent = `${year}年${month + 1}月`;
            
            // 星期标题
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            let html = weekdays.map(d => `<div class="calendar-weekday">${d}</div>`).join('');
            
            // 计算月份第一天和最后一天
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startWeekday = firstDay.getDay();
            
            // 上个月的天数
            const prevLastDay = new Date(year, month, 0);
            
            // 今天的日期
            const today = new Date();
            const todayStr = formatDateStr(today);
            
            // 渲染日期
            const totalDays = Math.ceil((lastDay.getDate() + startWeekday) / 7) * 7;
            
            for (let i = 0; i < totalDays; i++) {
                let day, dateStr, isOtherMonth = false;
                
                if (i < startWeekday) {
                    // 上个月
                    day = prevLastDay.getDate() - startWeekday + i + 1;
                    dateStr = formatDateStr(new Date(year, month - 1, day));
                    isOtherMonth = true;
                } else if (i >= startWeekday + lastDay.getDate()) {
                    // 下个月
                    day = i - startWeekday - lastDay.getDate() + 1;
                    dateStr = formatDateStr(new Date(year, month + 1, day));
                    isOtherMonth = true;
                } else {
                    // 当前月
                    day = i - startWeekday + 1;
                    dateStr = formatDateStr(new Date(year, month, day));
                }
                
                const isToday = dateStr === todayStr;
                const isSelected = dateStr === selectedDate;
                const doctor = schedule[dateStr];
                const isRest = restDays[dateStr];
                const isSwap = swaps[dateStr];
                const holiday = getHoliday(dateStr);
                const normalData = normalDays[dateStr]; // {am: '医生1', pm: '医生2'} 或 '医生1'
                
                let classes = ['calendar-day'];
                if (isOtherMonth) classes.push('other-month');
                if (isToday) classes.push('today');
                if (isSelected) classes.push('selected');
                if (holiday) classes.push('holiday');
                
                // 解析正常班数据
                let normalDisplay = '';
                if (normalData) {
                    if (typeof normalData === 'string') {
                        normalDisplay = `<div class="day-doctor" style="color:#059669;">正常: ${normalData}</div>`;
                    } else if (normalData.am || normalData.pm) {
                        if (normalData.am && normalData.pm) {
                            normalDisplay = `<div class="day-doctor" style="color:#059669; font-size:11px;">正常: ${normalData.am}(上午) ${normalData.pm}(下午)</div>`;
                        } else if (normalData.am) {
                            normalDisplay = `<div class="day-doctor" style="color:#059669;">正常(上午): ${normalData.am}</div>`;
                        } else {
                            normalDisplay = `<div class="day-doctor" style="color:#059669;">正常(下午): ${normalData.pm}</div>`;
                        }
                    }
                }
                
                html += `
                    <div class="${classes.join(' ')}" onclick="selectDay('${dateStr}')">
                        <div class="day-number">${day}</div>
                        ${holiday ? `<div class="day-holiday">${holiday}</div>` : ''}
                        ${doctor ? `<div class="day-doctor">${doctor}</div>` : ''}
                        ${normalDisplay}
                        ${isRest ? `<div class="day-rest">休息</div>` : ''}
                        ${isSwap ? `<div class="day-swap">调班</div>` : ''}
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }
        
        // 选择日期
        function selectDay(dateStr) {
            if (Object.keys(schedule).length === 0) {
                alert('请先生成排班');
                return;
            }
            
            selectedDate = dateStr;
            renderCalendar();
            
            // 打开弹窗
            const modal = document.getElementById('dayModal');
            const title = document.getElementById('modalTitle');
            const currentDoctor = document.getElementById('currentDoctor');
            const swapSelect = document.getElementById('swapDoctor');
            const restCheckbox = document.getElementById('markRest');
            const resetBtn = document.getElementById('resetBtn');
            const holidayInfo = document.getElementById('holidayInfo');
            const holidayName = document.getElementById('holidayName');
            const normalDaySection = document.getElementById('normalDaySection');
            const markNormalDay = document.getElementById('markNormalDay');
            const normalDoctorSection = document.getElementById('normalDoctorSection');
            const normalDoctorAM = document.getElementById('normalDoctorAM');
            const normalDoctorPM = document.getElementById('normalDoctorPM');
            
            const date = new Date(dateStr);
            title.textContent = `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
            
            const doctor = schedule[dateStr];
            currentDoctor.textContent = doctor || '无';
            
            // 显示假日信息
            const holiday = getHoliday(dateStr);
            if (holiday) {
                holidayInfo.style.display = 'block';
                holidayName.textContent = holiday;
                normalDaySection.style.display = 'block';
            } else {
                holidayInfo.style.display = 'none';
                normalDaySection.style.display = 'none';
            }
            
            // 填充医生选择
            const doctorOptions = '<option value="">选择医生...</option>' +
                doctors.map(d => `<option value="${d}">${d}</option>`).join('');
            swapSelect.innerHTML = doctorOptions.replace(`value="${swaps[dateStr]}"`, `value="${swaps[dateStr]}" selected`);
            normalDoctorAM.innerHTML = doctorOptions;
            normalDoctorPM.innerHTML = doctorOptions;
            
            // 正常班状态
            const normalData = normalDays[dateStr];
            if (normalData) {
                markNormalDay.checked = true;
                normalDoctorSection.style.display = 'block';
                if (typeof normalData === 'string') {
                    normalDoctorAM.value = normalData;
                } else {
                    if (normalData.am) normalDoctorAM.value = normalData.am;
                    if (normalData.pm) normalDoctorPM.value = normalData.pm;
                }
            } else {
                markNormalDay.checked = false;
                normalDoctorSection.style.display = 'none';
            }
            
            // 休息状态
            restCheckbox.checked = !!restDays[dateStr];
            
            // 显示重置按钮
            resetBtn.style.display = (swaps[dateStr] || restDays[dateStr] || normalDays[dateStr]) ? 'block' : 'none';
            
            modal.classList.add('active');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
            selectedDate = null;
            renderCalendar();
        }
        
        // 保存日期修改
        function saveDayChange() {
            const swapDoctor = document.getElementById('swapDoctor').value;
            const isRest = document.getElementById('markRest').checked;
            const markNormalDayEl = document.getElementById('markNormalDay');
            const normalDaySection = document.getElementById('normalDaySection');
            const normalDoctorAM = document.getElementById('normalDoctorAM').value;
            const normalDoctorPM = document.getElementById('normalDoctorPM').value;
            const isNormalDay = markNormalDayEl.checked && normalDaySection.style.display !== 'none';
            
            if (swapDoctor) {
                // 调班
                swaps[selectedDate] = swapDoctor;
                schedule[selectedDate] = swapDoctor;
                addRecord(selectedDate, `调班为 ${swapDoctor}`);
            } else if (isRest) {
                // 休息
                const originalDoctor = schedule[selectedDate];
                restDays[selectedDate] = true;
                delete schedule[selectedDate];
                
                if (originalDoctor) {
                    // 顺延到下一天
                    const nextDate = findNextAvailableDate(selectedDate, originalDoctor);
                    if (nextDate) {
                        schedule[nextDate] = originalDoctor;
                    }
                }
                
                addRecord(selectedDate, `休息日`);
            }
            
            // 处理法定假日正常班
            if (isNormalDay && (normalDoctorAM || normalDoctorPM)) {
                const normalData = {};
                if (normalDoctorAM) normalData.am = normalDoctorAM;
                if (normalDoctorPM) normalData.pm = normalDoctorPM;
                
                // 如果只有一个人，简化存储
                if (normalDoctorAM && !normalDoctorPM) {
                    normalDays[selectedDate] = normalDoctorAM;
                    addRecord(selectedDate, `法定假日正常班: ${normalDoctorAM}`);
                } else if (!normalDoctorAM && normalDoctorPM) {
                    normalDays[selectedDate] = normalDoctorPM;
                    addRecord(selectedDate, `法定假日正常班: ${normalDoctorPM}`);
                } else {
                    normalDays[selectedDate] = normalData;
                    addRecord(selectedDate, `法定假日正常班: ${normalDoctorAM}(上午) ${normalDoctorPM}(下午)`);
                }
            } else if (isNormalDay) {
                // 勾选了但没选医生，删除
                delete normalDays[selectedDate];
            } else {
                delete normalDays[selectedDate];
            }
            
            saveData();
            closeModal();
            renderCalendar();
            renderRecords();
        }
        
        // 重置日期
        function resetDay() {
            delete swaps[selectedDate];
            delete restDays[selectedDate];
            delete normalDays[selectedDate];
            
            // 重新生成该日期的排班
            const startDate = document.getElementById('startDate').value;
            const start = new Date(startDate);
            const selected = new Date(selectedDate);
            
            const daysDiff = Math.floor((selected - start) / (1000 * 60 * 60 * 24));
            if (daysDiff >= 0) {
                schedule[selectedDate] = doctors[daysDiff % doctors.length];
            }
            
            addRecord(selectedDate, '重置');
            saveData();
            closeModal();
            renderCalendar();
            renderRecords();
        }
        
        // 添加记录
        function addRecord(dateStr, action) {
            records.unshift({
                date: dateStr,
                action: action,
                time: new Date().toLocaleString()
            });
            
            // 只保留最近50条
            if (records.length > 50) {
                records = records.slice(0, 50);
            }
        }
        
        // 渲染记录
        function renderRecords() {
            const list = document.getElementById('recordsList');
            
            if (records.length === 0) {
                list.innerHTML = '<p style="color:#999; text-align:center;">暂无记录</p>';
                return;
            }
            
            list.innerHTML = records.slice(0, 20).map(r => `
                <div class="record-item">
                    <span class="date">${r.date}</span>
                    <span class="action">${r.action}</span>
                    <span style="color:#999; font-size:12px; margin-left:8px;">${r.time}</span>
                </div>
            `).join('');
        }
        
        // 上个月
        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }
        
        // 下个月
        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }
        
        // 导出图片
        async function exportImage() {
            if (Object.keys(schedule).length === 0) {
                alert('请先生成排班');
                return;
            }
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // 创建导出内容
            const exportArea = document.getElementById('exportArea');
            exportArea.style.display = 'block';
            exportArea.style.position = 'absolute';
            exportArea.style.left = '-9999px';
            
            // 生成表格
            let html = `
                <div style="font-family: sans-serif; padding: 20px; background: white; width: 800px;">
                    <h2 style="text-align: center; margin-bottom: 20px;">医生排班表 - ${year}年${month + 1}月</h2>
                    <table style="width: 100%; border-collapse: collapse;">
                        <tr>
                            ${['日', '一', '二', '三', '四', '五', '六'].map(d => 
                                `<th style="border: 1px solid #ddd; padding: 10px; background: #f5f5f5;">${d}</th>`
                            ).join('')}
                        </tr>
            `;
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startWeekday = firstDay.getDay();
            const prevLastDay = new Date(year, month, 0);
            
            const totalDays = Math.ceil((lastDay.getDate() + startWeekday) / 7) * 7;
            let cells = '';
            
            for (let i = 0; i < totalDays; i++) {
                if (i % 7 === 0) cells += '<tr>';
                
                let day, dateStr;
                
                if (i < startWeekday) {
                    day = prevLastDay.getDate() - startWeekday + i + 1;
                    dateStr = formatDateStr(new Date(year, month - 1, day));
                } else if (i >= startWeekday + lastDay.getDate()) {
                    day = i - startWeekday - lastDay.getDate() + 1;
                    dateStr = formatDateStr(new Date(year, month + 1, day));
                } else {
                    day = i - startWeekday + 1;
                    dateStr = formatDateStr(new Date(year, month, day));
                }
                
                const doctor = schedule[dateStr];
                const isRest = restDays[dateStr];
                const holiday = getHoliday(dateStr);
                const normalData = normalDays[dateStr];
                
                // 解析正常班显示
                let normalText = '';
                if (normalData) {
                    if (typeof normalData === 'string') {
                        normalText = `<div style="color: #059669; font-size: 11px;">正常: ${normalData}</div>`;
                    } else if (normalData.am || normalData.pm) {
                        if (normalData.am && normalData.pm) {
                            normalText = `<div style="color: #059669; font-size: 10px;">正常: ${normalData.am}(上午)</div><div style="color: #059669; font-size: 10px;">${normalData.pm}(下午)</div>`;
                        } else if (normalData.am) {
                            normalText = `<div style="color: #059669; font-size: 11px;">正常(上午): ${normalData.am}</div>`;
                        } else {
                            normalText = `<div style="color: #059669; font-size: 11px;">正常(下午): ${normalData.pm}</div>`;
                        }
                    }
                }
                
                // 背景色：法定假日红色背景，休息日浅红
                let bgColor = '';
                if (holiday) {
                    bgColor = 'background: #fecaca;'; // 法定假日红色背景
                } else if (isRest) {
                    bgColor = 'background: #fee;';
                }
                
                cells += `
                    <td style="border: 1px solid #ddd; padding: 8px; height: 60px; vertical-align: top; ${bgColor}">
                        <div style="font-weight: bold;">${day}</div>
                        ${holiday ? `<div style="color: #dc2626; font-size: 10px; font-weight: 600;">${holiday}</div>` : ''}
                        <div style="color: #667eea; font-size: 12px;">${doctor || ''}</div>
                        ${normalText}
                        ${isRest ? '<div style="color: #ef4444; font-size: 11px;">休息</div>' : ''}
                    </td>
                `;
                
                if (i % 7 === 6) cells += '</tr>';
            }
            
            html += cells + '</table>';
            
            // 图例说明
            html += `
                <div style="margin-top: 15px; padding: 10px; background: #f9f9f9; border-radius: 8px; font-size: 13px;">
                    <div style="margin-bottom: 8px;"><strong>值班医生：</strong>${doctors.join('、')}</div>
                    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                        <span style="display: flex; align-items: center; gap: 5px;">
                            <span style="width: 16px; height: 16px; background: #fecaca; border: 1px solid #ddd; display: inline-block;"></span>
                            法定假日
                        </span>
                        <span style="display: flex; align-items: center; gap: 5px;">
                            <span style="width: 16px; height: 16px; background: #fee; border: 1px solid #ddd; display: inline-block;"></span>
                            休息日
                        </span>
                        <span style="color: #059669;">正常班</span>
                    </div>
                </div>
            `;
            
            html += '</div>';
            
            exportArea.innerHTML = html;
            
            // 生成图片
            try {
                const canvas = await html2canvas(exportArea, { scale: 2 });
                const link = document.createElement('a');
                link.download = `排班表_${year}年${month + 1}月.png`;
                link.href = canvas.toDataURL();
                link.click();
            } catch (e) {
                alert('导出失败，请重试');
                console.error(e);
            }
            
            exportArea.style.display = 'none';
        }
        
        // 工具函数
        function formatDateStr(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        
        function saveData() {
            localStorage.setItem('paiban_doctors', JSON.stringify(doctors));
            localStorage.setItem('paiban_schedule', JSON.stringify(schedule));
            localStorage.setItem('paiban_records', JSON.stringify(records));
            localStorage.setItem('paiban_rest', JSON.stringify(restDays));
            localStorage.setItem('paiban_swaps', JSON.stringify(swaps));
            localStorage.setItem('paiban_normal', JSON.stringify(normalDays));
        }
        
        // 正常班复选框联动
        document.getElementById('markNormalDay').addEventListener('change', function() {
            document.getElementById('normalDoctorSection').style.display = this.checked ? 'block' : 'none';
        });
        
        // 回车添加医生
        document.getElementById('doctorName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addDoctor();
        });
    </script>
</body>
</html>
